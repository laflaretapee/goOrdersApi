services:
  db:
    image: postgres:16-alpine
    container_name: go-orders-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_create_orders.sql:/docker-entrypoint-initdb.d/001_create_orders.sql:ro

volumes:
  postgres_data:
